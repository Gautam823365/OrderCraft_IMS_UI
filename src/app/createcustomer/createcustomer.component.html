<div class="flex items-center justify-center min-h-screen bg-gradient-to-tr from-blue-100 to-indigo-200 px-4 sm:px-8 lg:px-16">
  <div class="bg-white p-8 sm:p-10 md:p-12 rounded-xl shadow-xl w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6 text-indigo-700">
      <i class="fas fa-user-plus mr-2"></i>New Customer Registration
    </h2>

    <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <input formControlName="cust_name" type="text" placeholder="Full Name"
        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

      <input formControlName="cust_phoneno" type="text" placeholder="Phone Number"
        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

      <input formControlName="cust_email" type="email" placeholder="Email"
        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

      <input formControlName="street" type="text" placeholder="Street"
        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

      <input formControlName="city" type="text" placeholder="City"
        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

      <input formControlName="state" type="text" placeholder="State"
        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

      <input formControlName="postalcode" type="text" placeholder="Postal Code"
        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

      <input formControlName="country" type="text" placeholder="Country"
        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="bg-red-100 text-red-700 px-4 py-2 rounded-md text-sm font-medium">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <!-- Submit Button -->
<div class="mt-4">
  <button 
    type="submit" 
    [disabled]="customerForm.invalid || submitting"
    class="w-full bg-indigo-600 text-white py-3 rounded-md hover:bg-indigo-700 transition disabled:opacity-50 flex items-center justify-center">
    
    <ng-container *ngIf="!submitting; else loadingTemplate">
      <i class="fas fa-user-check mr-2"></i> Register
    </ng-container>

    <ng-template #loadingTemplate>
      <i class="fas fa-spinner fa-spin mr-2"></i> Submitting...
    </ng-template>
    Register
  </button>

</div>

    </form>
  </div>
</div>
